    <aside class="controls">
        <h3 style="color: #D9D9D9; font-size: 14px; letter-spacing: 1px; margin-bottom: 15px;">Parámetros Visuales</h3>
        
        <button type="button" id="btnCargarGeoJSON" class="map-button">Importar Dataset</button>

        <div class="separator"></div>

        <label>MAPA BASE
            <select id="baseMapSelect">
                <option value="dark">Modo Escuro (CartoDB)</option>
                <option value="streets">OpenStreetMap (Rutas)</option>
                <option value="satellite">Satélite (Esri)</option>
            </select>
        </label>

        <label>MÉTODO ESTATÍSTICO
            <select id="classificationSelect">
                <option value="jenks" selected>Optimizar Grupos(Jenks)</option>
                <option value="equal">Rangos Uniformes</option>
                <option value="quartiles">Distribución por Cuartos</option>
            </select>
        </label>

        
            <label for="paletteSelect">Esquema Cromático
</label>
<select id="paletteSelect">
    <option value="reds">Escala de Rojos</option>
    <option value="purples">Escala de Purpúreos</option>
    <option value="greens">Escala de Verdes</option>
    <option value="yellows">Escala de Amarillos</option>
    <option value="blues" selected>Escala de Azules</option>
</select>
        </label>

        <label> Seleccionar Entidad Administrativa<select id="labelSelect">

            </select>
